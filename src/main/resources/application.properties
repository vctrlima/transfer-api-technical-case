server.port=8080

spring.application.name=transfer
spring.datasource.url=jdbc:h2:mem:transferdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.sql.init.mode=always

spring.threads.virtual.enabled=true

spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.order_inserts=true

server.tomcat.threads.max=400
server.tomcat.threads.min-spare=50
server.tomcat.accept-count=200
server.tomcat.max-connections=10000

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false

spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=20
spring.data.redis.lettuce.pool.min-idle=10
spring.data.redis.lettuce.pool.max-wait=2000ms

aws.endpoint-url=http://localhost:4566
aws.region=us-east-1
aws.access-key=test
aws.secret-key=test
aws.sqs.queue-url=http://localhost:4566/000000000000/bacen-events
aws.sqs.dlq-url=http://localhost:4566/000000000000/bacen-events-dlq
aws.sqs.consumer.enabled=true

cadastro.api.url=http://localhost:8081
bacen.api.url=http://localhost:8082

feign.httpclient.hc5.enabled=true
feign.httpclient.hc5.max-connections=200
feign.httpclient.hc5.max-connections-per-route=50

feign.client.config.cadastro.connect-timeout=500
feign.client.config.cadastro.read-timeout=2000

feign.client.config.bacen.connect-timeout=500
feign.client.config.bacen.read-timeout=2000

resilience4j.circuitbreaker.instances.cadastro.register-health-indicator=true
resilience4j.circuitbreaker.instances.cadastro.sliding-window-size=10
resilience4j.circuitbreaker.instances.cadastro.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.cadastro.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.cadastro.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.cadastro.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.cadastro.ignore-exceptions=feign.FeignException.FeignClientException

resilience4j.circuitbreaker.instances.bacen.register-health-indicator=true
resilience4j.circuitbreaker.instances.bacen.sliding-window-size=10
resilience4j.circuitbreaker.instances.bacen.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.bacen.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.bacen.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.bacen.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.bacen.ignore-exceptions=com.personal.transfer.infrastructure.adapters.BacenRateLimitException

resilience4j.retry.instances.cadastro.max-attempts=2
resilience4j.retry.instances.cadastro.wait-duration=50ms
resilience4j.retry.instances.cadastro.enable-exponential-backoff=true
resilience4j.retry.instances.cadastro.exponential-backoff-multiplier=2

resilience4j.retry.instances.bacen.max-attempts=3
resilience4j.retry.instances.bacen.wait-duration=1s
resilience4j.retry.instances.bacen.enable-exponential-backoff=true
resilience4j.retry.instances.bacen.exponential-backoff-multiplier=2
resilience4j.retry.instances.bacen.ignore-exceptions=com.personal.transfer.infrastructure.adapters.BacenRateLimitException

management.endpoints.web.exposure.include=health,info,prometheus,metrics,circuitbreakerevents,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
management.tracing.sampling.probability=0.01

transfer.daily-limit=1000.00

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [traceId=%X{traceId},spanId=%X{spanId}] %logger{36} - %msg%n
