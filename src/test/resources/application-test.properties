spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.repositories.enabled=false

spring.task.scheduling.enabled=false
aws.sqs.consumer.enabled=false

spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always

management.tracing.enabled=false
spring.zipkin.enabled=false

resilience4j.retry.instances.bacen.max-attempts=3
resilience4j.retry.instances.bacen.wait-duration=10ms
resilience4j.retry.instances.bacen.enable-exponential-backoff=false

resilience4j.retry.instances.cadastro.max-attempts=2
resilience4j.retry.instances.cadastro.wait-duration=10ms
resilience4j.retry.instances.cadastro.enable-exponential-backoff=false

resilience4j.circuitbreaker.instances.bacen.sliding-window-size=3
resilience4j.circuitbreaker.instances.bacen.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.bacen.failure-rate-threshold=100
resilience4j.circuitbreaker.instances.bacen.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.bacen.ignore-exceptions=com.personal.transfer.infrastructure.adapters.BacenRateLimitException
